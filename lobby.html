<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌大廳 - 準備！！</title>
    
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        /* --- 莫蘭迪高級毛玻璃大廳 UI --- */
        :root {
            /* 🌟 同步莫蘭迪色系 */
            --premium-gold: #e8c56a;    
            --premium-dark: #2c3440;    
            --premium-bg: #7EA59F;      
            --text-soft: #f0f0f0;       
            --text-muted: #a6b3c9;      
            
            /* 四家專屬顏色 */
            --team-blue: #5F8AAF;       
            --team-red: #E07374;        
            --team-yellow: #E0A800;     
            --team-green: #539357;      
        }

        body, html {
            height: 100%; margin: 0;
            background: radial-gradient(circle, #8bb5af 0%, #7EA59F 100%);
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: var(--text-soft);
        }

        /* 🌟 毛玻璃質感卡片 */
        .lobby-card { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(58, 77, 99, 0.85) 0%, rgba(44, 52, 64, 0.95) 100%);
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.15); 
            width: 750px; max-width: 95vw; 
            display: flex; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px);
            text-align: left;
            overflow: hidden;
        }
        
        /* 左半部：名字與準備按鈕 */
        .left-panel { 
            flex: 1; padding: 40px; 
            background: rgba(0,0,0,0.2); 
            border-right: 1px solid rgba(255,255,255,0.08); 
            display: flex; flex-direction: column; justify-content: center;
        }
        .left-panel h2 { 
            color: var(--premium-gold); margin-top: 0; 
            letter-spacing: 4px; text-align: center; 
            font-weight: 900; font-size: 1.8rem;
            text-shadow: 0 4px 10px rgba(232, 197, 106, 0.2);
        }
        
        .input-group { margin: 30px 0; }
        input { 
            padding: 15px; border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            width: 100%; box-sizing: border-box; 
            background: rgba(0,0,0,0.25); color: white; 
            text-align: center; font-size: 1.1rem; 
            transition: all 0.3s ease; letter-spacing: 1px;
        }
        input:focus { outline: none; border-color: var(--premium-gold); background: rgba(0,0,0,0.4); }
        
        .msg { font-size: 0.95rem; text-align: center; color: var(--text-muted); margin-bottom: 20px; letter-spacing: 1px;}

        /* 準備按鈕 */
        .btn-confirm { 
            background: linear-gradient(135deg, #f2d780, var(--premium-gold)); 
            color: #222; padding: 15px 0; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); margin-top: auto; 
            letter-spacing: 2px; box-shadow: 0 8px 20px rgba(232, 197, 106, 0.25);
        }
        .btn-confirm:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(232, 197, 106, 0.4); }
        .btn-confirm:disabled { background: rgba(255,255,255,0.1); color: #888; cursor: not-allowed; box-shadow: none; }
        
        /* 右半部：座位區 */
        .right-panel { 
            flex: 1.2; padding: 40px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .teams-container { display: flex; flex-direction: column; gap: 25px; }
        
        .team-box { 
            background: rgba(0,0,0,0.15); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; padding: 20px; 
        }
        .team-box h3 { 
            margin: 0 0 15px 0; font-size: 1rem; color: var(--text-muted); 
            text-align: center; font-weight: bold; letter-spacing: 2px;
        }
        
        .seat-row { display: flex; gap: 15px; }
        
        /* 🌟 座位容器 (包含入座按鈕 + 加電腦按鈕) */
        .seat-container {
            flex: 1; display: flex; flex-direction: column; gap: 8px;
        }

        /* 玩家座位按鈕 */
        .seat-btn { 
            width: 100%; padding: 15px 10px; margin: 0; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; 
            color: var(--text-soft); cursor: pointer; transition: all 0.3s ease; 
            font-size: 0.95rem; text-align: center; letter-spacing: 1px;
        }
        .seat-btn:hover:not(:disabled) { 
            background: rgba(255,255,255,0.15); 
            border-color: var(--text-soft); transform: translateY(-2px); 
        }
        .seat-btn.occupied { background: rgba(0,0,0,0.3); cursor: not-allowed; border-color: transparent; color: #888; }
        
        /* 自己入座的狀態 */
        .seat-btn.my-seat { 
            background: var(--team-blue); color: white; font-weight: bold; 
            border-color: var(--team-blue); box-shadow: 0 5px 15px rgba(95, 138, 175, 0.4); 
        }
        /* 準備好的狀態 */
        .seat-btn.ready { 
            background: var(--team-green) !important; color: white !important; 
            border-color: var(--team-green) !important; box-shadow: 0 5px 15px rgba(83, 147, 87, 0.4) !important;
        }

        /* 🌟 加入電腦按鈕 */
        .add-ai-btn {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.3);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .add-ai-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white; border-color: white;
        }
        /* 當該位置有人時，隱藏加電腦按鈕 */
        .hide-ai-btn { display: none !important; }

        /* 📱 手機橫屏優化 (RWD) */
        @media screen and (max-height: 500px), screen and (max-width: 800px) {
            .lobby-card { width: 95vw; height: 90vh; border-radius: 12px; }
            .left-panel, .right-panel { padding: 15px 20px; }
            .left-panel h2 { font-size: 1.4rem; }
            .input-group { margin: 10px 0; }
            input { padding: 10px; font-size: 0.95rem; }
            .btn-confirm { padding: 10px 0; font-size: 1rem; }
            .teams-container { gap: 10px; }
            .team-box { padding: 10px; border-radius: 8px; }
            .team-box h3 { margin: 0 0 8px 0; font-size: 0.85rem; }
            .seat-row { gap: 10px; }
            .seat-btn { padding: 8px 5px; font-size: 0.85rem; }
            .add-ai-btn { padding: 4px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="lobby-card">
        
        <div class="left-panel">
            <h2>大廳準備</h2>
            <div class="input-group">
                <input type="text" id="name-input" placeholder="請輸入您的尊姓大名">
            </div>
            <p class="msg" id="status-text">已準備: 0/4</p>
            <button id="ready-btn" class="btn-confirm" onclick="toggleReady()" disabled>請先入座</button>
        </div>

        <div class="right-panel">
            <div class="teams-container">
                <div class="team-box">
                    <h3>隊伍 A (南北家)</h3>
                    <div class="seat-row">
                        <div class="seat-container">
                            <button class="seat-btn" id="seat-north" onclick="claimSeat('north')">北: 虛位以待</button>
                            <button class="add-ai-btn" id="add-ai-north" onclick="addComputer('north')">+ 安排電腦</button>
                        </div>
                        <div class="seat-container">
                            <button class="seat-btn" id="seat-south" onclick="claimSeat('south')">南: 虛位以待</button>
                            <button class="add-ai-btn" id="add-ai-south" onclick="addComputer('south')">+ 安排電腦</button>
                        </div>
                    </div>
                </div>

                <div class="team-box">
                    <h3>隊伍 B (東西家)</h3>
                    <div class="seat-row">
                        <div class="seat-container">
                            <button class="seat-btn" id="seat-west" onclick="claimSeat('west')">西: 虛位以待</button>
                            <button class="add-ai-btn" id="add-ai-west" onclick="addComputer('west')">+ 安排電腦</button>
                        </div>
                        <div class="seat-container">
                            <button class="seat-btn" id="seat-east" onclick="claimSeat('east')">東: 虛位以待</button>
                            <button class="add-ai-btn" id="add-ai-east" onclick="addComputer('east')">+ 安排電腦</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/lobby-logic.js"></script>
</body>
</html>
