<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌大廳 - 穩定準備室</title>
    
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        /* 這裡只保留 lobby 專用的樣式 */
        .lobby-card { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 2px solid var(--btn-gold); width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { color: var(--btn-gold); margin-top: 0; letter-spacing: 2px; }
        .input-group { margin-bottom: 25px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid var(--btn-gold); width: 100%; box-sizing: border-box; background: #333; color: white; text-align: center; font-size: 1rem; }
        .player-list { margin: 20px 0; border-top: 1px solid #444; }
        .player-item { padding: 12px 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-white); }
        .status-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
        .ready { background: #27ae60; color: white; }
        .waiting { background: #7f8c8d; color: white; }
        .btn-confirm { background: var(--btn-gold); color: #1a3c14; padding: 12px 0; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; }
        .msg { font-size: 0.8rem; margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>
    <div class="lobby-card">
        <h2>遊戲準備室</h2>
        <div class="input-group"><input type="text" id="name-input" placeholder="請輸入暱稱"></div>
        <button id="ready-btn" class="btn-confirm" onclick="toggleReady()">確認準備</button>
        <div class="player-list" id="player-list"></div>
        <p class="msg" id="status-text">等待玩家加入...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    
    <script src="js/lobby-logic.js"></script>
</body>
</html>
