<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌大廳 - 穩定準備室</title>
    <style>
        :root { --bg-dark: #1a3c14; --gold: #f1c40f; --white: #ecf0f1; }
        body { background: var(--bg-dark); color: var(--white); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .lobby-card { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 2px solid var(--gold); width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); margin-top: 0; letter-spacing: 2px; }
        .input-group { margin-bottom: 25px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid var(--gold); width: 100%; box-sizing: border-box; background: #333; color: white; text-align: center; font-size: 1rem; }
        .player-list { margin: 20px 0; border-top: 1px solid #444; }
        .player-item { padding: 12px 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .status-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
        .ready { background: #27ae60; color: white; }
        .waiting { background: #7f8c8d; color: white; }
        .btn-confirm { background: var(--gold); color: #1a3c14; padding: 12px 0; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; }
        .msg { font-size: 0.8rem; margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>
    <div class="lobby-card">
        <h2>遊戲準備室</h2>
        <div class="input-group"><input type="text" id="name-input" placeholder="請輸入暱稱"></div>
        <button id="ready-btn" class="btn-confirm" onclick="toggleReady()">確認準備</button>
        <div class="player-list" id="player-list"></div>
        <p class="msg" id="status-text">等待玩家加入...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAkwCXf6_Fd4jp79tk6YUC9yHynYXjLDQ",
            authDomain: "bridge-go.firebaseapp.com",
            projectId: "bridge-go",
            databaseURL: "https://bridge-go-default-rtdb.firebaseio.com",
            appId: "1:212052576521:web:dd45f303d59f5315ddabd8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const roomId = "Room_Alpha"; 

        const playersRef = database.ref('players/' + roomId);
        const gamesRef = database.ref('games/' + roomId);

        let myRole = "";
        let isReady = false;
        let myConfirmedName = ""; 
        const nameInput = document.getElementById('name-input');
        nameInput.value = localStorage.getItem('bridge_name') || "";

        function listenLobby() {
            database.ref().on('value', (snap) => {
                const all = snap.val() || {};
                const players = all.players ? all.players[roomId] : {};
                const game = all.games ? all.games[roomId] : {};
                
                const listEl = document.getElementById('player-list');
                listEl.innerHTML = "";
                const roles = ['south', 'west', 'north', 'east'];
                let readyCount = 0;

                roles.forEach(r => {
                    const p = players[r];
                    const nameTxt = p ? p.name : "等待加入...";
                    const statusClass = (p && p.ready) ? "ready" : "waiting";
                    listEl.innerHTML += `<div class="player-item"><span>${nameTxt}</span><span class="status-tag ${statusClass}">${(p && p.ready) ? '已準備' : '-'}</span></div>`;
                    if (p && p.ready) readyCount++;
                });

                document.getElementById('status-text').innerText = `已準備: ${readyCount}/4`;

                if (readyCount === 4) {
                    if (myRole === "south" && game.gameStarted !== true) {
                        gamesRef.update({ gameStarted: true });
                    }
                    if (game.gameStarted === true && isReady) {
                        window.location.href = `four_people.html?pname=${encodeURIComponent(myConfirmedName)}&rid=${roomId}`;
                    }
                }
            });
        }

        function toggleReady() {
            const name = nameInput.value.trim();
            if (!name) { alert("請先輸入名字"); return; }
            
            if (!isReady) {
                playersRef.transaction((p) => {
                    if (!p) {
                        p = {};
                        gamesRef.set({ gameStarted: false });
                    }
                    const roles = ['south', 'west', 'north', 'east'];
                    for (let r of roles) {
                        if (!p[r]) {
                            myRole = r;
                            p[r] = { name: name, ready: true };
                            return p;
                        }
                    }
                    return; 
                }, (err, committed) => {
                    if (committed && myRole) {
                        isReady = true;
                        myConfirmedName = name;
                        localStorage.setItem('bridge_name', name);
                        updateUI(true);
                        // 重要：移除所有會洗掉整間房的 onDisconnect
                    }
                });
            } else {
                playersRef.child(myRole).remove();
                isReady = false;
                myRole = "";
                updateUI(false);
            }
        }

        function updateUI(ready) {
            const btn = document.getElementById('ready-btn');
            btn.innerText = ready ? "取消準備" : "確認準備";
            btn.style.background = ready ? "#e74c3c" : "#f1c40f";
            nameInput.disabled = ready;
        }

        listenLobby();
    </script>
</body>
</html>
