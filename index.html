<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡橋牌 - 線上對戰</title>
    <style>
        :root {
            --bridge-green: #1a5d1a;
            --btn-gold: #f1c40f;
            --text-white: #ecf0f1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: radial-gradient(circle, #2d5a27 0%, #1a3c14 100%);
        }

        /* 轉向提示遮罩 */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media screen and (orientation: portrait) {
            #orientation-overlay { display: flex; }
            .main-menu { display: none; }
        }

        /* 主選單容器 */
        .main-menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            transition: opacity 0.5s ease;
        }

        .title-area {
            margin-bottom: 30px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
        }

        .title-area h1 {
            font-size: 3rem;
            color: var(--btn-gold);
            margin: 0;
            letter-spacing: 10px;
        }

        .title-area p {
            color: var(--text-white);
            font-weight: 300;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 按鈕群組 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--btn-gold);
            color: var(--btn-gold);
            padding: 15px 0;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .menu-btn:hover {
            background: var(--btn-gold);
            color: #1a3c14;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        .menu-btn span {
            font-size: 0.8rem;
            display: block;
            font-weight: normal;
            opacity: 0.8;
        }

        /* 裝飾用的撲克符號 */
        .suit-deco {
            position: absolute;
            font-size: 10rem;
            opacity: 0.05;
            color: white;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <div style="font-size: 4rem; transform: rotate(-90deg); margin-bottom: 20px;">📱</div>
        <h2>請旋轉裝置為橫向</h2>
        <p>為了獲得最佳牌桌視野，請開啟螢幕旋轉功能</p>
    </div>

    <div class="suit-deco" style="top: 10%; left: 10%;">♠</div>
    <div class="suit-deco" style="bottom: 10%; right: 10%;">♥</div>

    <div class="main-menu">
        <div class="title-area">
            <h1>極簡橋牌</h1>
            <p align="center">Online Bridge Studio</p>
        </div>

        <div class="button-group">
            <button class="menu-btn" onclick="selectMode(1)">一人模式 <span>練習 & AI 對弈</span></button>
            <button class="menu-btn" onclick="selectMode(2)">二人模式 <span>快速配對隊友</span></button>
            <button class="menu-btn" onclick="selectMode(3)">三人模式 <span>特殊挑戰規則</span></button>
            <button class="menu-btn" onclick="selectMode(4)">四人開桌 <span>標準 2 vs 2 對抗</span></button>
        </div>
    </div>

    <script>
        function selectMode(num) {
            console.log("選擇人數:", num);
            
            // 嘗試請求全螢幕 (在手機瀏覽器提升體驗)
            const doc = window.document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen().catch(() => {}); 
            }

            // 這裡可以導向下一頁，例如：
            // window.location.href = `game.html?players=${num}`;
            alert(`已選擇 ${num} 人模式，即將進入遊戲...`);
        }
    </script>
</body>
</html>
