<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡橋牌 - 入口選單</title>
    <style>
        :root {
            --bridge-green: #1a5d1a;
            --btn-gold: #f1c40f;
            --text-white: #ecf0f1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: radial-gradient(circle, #2d5a27 0%, #1a3c14 100%);
        }

        /* 轉向提示遮罩 */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: white; z-index: 1000;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }

        @media screen and (orientation: portrait) {
            #orientation-overlay { display: flex; }
            .main-menu { display: none; }
        }

        /* 主選單容器 */
        .main-menu {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100%;
        }

        .title-area { margin-bottom: 30px; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .title-area h1 { font-size: 3rem; color: var(--btn-gold); margin: 0; letter-spacing: 10px; }

        .button-group { display: flex; flex-direction: column; gap: 15px; width: 320px; }

        .menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--btn-gold);
            color: var(--btn-gold);
            padding: 12px 0;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-align: center;
        }

        .menu-btn:hover {
            background: var(--btn-gold);
            color: #1a3c14;
            transform: scale(1.05);
        }

        .menu-btn span { font-size: 0.75rem; display: block; font-weight: normal; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <div style="font-size: 4rem; transform: rotate(-90deg); margin-bottom: 20px;">📱</div>
        <h2>請旋轉裝置為橫向</h2>
        <p>橋牌需要較寬的視角，請開啟螢幕旋轉功能</p>
    </div>

    <div class="main-menu">
        <div class="title-area">
            <h1>極簡橋牌</h1>
        </div>

        <div class="button-group">
            <button class="menu-btn" onclick="alert('一人模式開發中！')">一人模式 <span>練習 & AI 對弈</span></button>
            <button class="menu-btn" onclick="alert('二人模式開發中！')">二人模式 <span>快速配對隊友</span></button>
            <button class="menu-btn" onclick="alert('三人模式開發中！')">三人模式 <span>特殊挑戰規則</span></button>
            <button class="menu-btn" onclick="goToGame(4)">四人開桌 <span>標準 2 vs 2 連線對抗</span></button>
        </div>
    </div>

    <script>
        function goToGame(num) {
            // 請求全螢幕提升遊戲感
            const doc = window.document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen().catch(() => {}); 
            }

            // 跳轉至 four_people.html
            // 我們可以透過 URL 參數傳遞人數，讓 game 頁面知道目前模式
            // window.location.href = "four_people.html?mode=" + num;
            window.location.href = "lobby.html?mode=" + num;
        }
    </script>
</body>
</html>
