<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌單人模式 - 專業競技版</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="loading" class="waiting-overlay">
        <h2>遊戲準備中... 洗牌發牌中...</h2>
    </div>

<div class="top-nav-bar">
        
        <div class="game-status nav-left">
            <span id="contract-display">喊牌中...</span> 
        </div>

        <div class="teams-container nav-center">
            <div class="team-info">
                <div class="dot bg-blue" id="dot-south"></div>
                <div class="dot bg-red" id="dot-north"></div>
                <span class="team-text" id="score-ns-text"> 0/?</span>
            </div>
            
            <span class="nav-divider">|</span>
            
            <div class="team-info">
                <div class="dot bg-yellow" id="dot-west"></div>
                <div class="dot bg-green" id="dot-east"></div>
                <span class="team-text" id="score-ew-text"> 0/?</span>
            </div>
        </div>
        
        <div class="nav-right">
            <button id="btn-rules" class="btn-rules">?</button>
        </div>

    </div>

    <div id="rules-overlay" class="rules-modal">
        <h3 style="margin-top:0; color:var(--premium-gold); text-align:center;">遊戲規則</h3>
        <ul style="padding-left: 20px; line-height: 1.6; font-size: 0.95rem; margin-bottom:0;">
            <li><b>喊牌階段</b>：依序出價，最高者成為莊家，決定王牌花色。</li>
            <li><b>打牌階段</b>：必須跟隨第一家打出的花色。無該花色時才可出其他牌或王牌。</li>
            <li><b>王牌最大</b>：若有人出王牌，則王牌點數最大者贏得該墩。</li>
            <li><b>勝利方式</b>：達到指定墩數時，立即勝利。</li>
            <li><b>燒線機制</b>：時間到時，系統將自動幫你出牌！</li>
        </ul>
    </div>

    <div id="bidding-modal">
        <div id="bidding-history">等待喊牌...</div>
        <div class="bid-grid" id="bid-buttons-container"></div>
        <button class="bid-btn pass-btn" id="btn-pass" onclick="submitBid('Pass')">Pass</button>
    </div>

    <div class="table-container">
        
        <div class="player-slot pos-top">
            <div class="player-info" id="label-top">等待中...</div>
            <div class="trick-pile pile-top" id="pile-top">0</div>
        </div>
        
        <div class="player-slot pos-left">
            <div class="player-info" id="label-left">等待中...</div>
            <div class="trick-pile pile-left" id="pile-left">0</div>
        </div>
        
        <div class="center-field" id="table-center">
            <div class="play-slot slot-north" id="slot-north"></div>
            <div class="play-slot slot-west" id="slot-west"></div>
            <div class="play-slot slot-east" id="slot-east"></div>
            <div class="play-slot slot-south" id="slot-south"></div>
        </div>
        
        <div class="player-slot pos-right">
            <div class="player-info" id="label-right">等待中...</div>
            <div class="trick-pile pile-right" id="pile-right">0</div>
        </div>
        
        <div class="player-slot pos-bottom">
            <div class="player-info" id="label-bottom">- (你)</div>
            <div class="trick-pile pile-bottom" id="pile-bottom">0</div>
            <div class="hand-area" id="my-hand"></div>
        </div>
        
    </div>

    <div id="victory-overlay">
        <div class="victory-card">
            <h1 id="victory-title">Victory</h1>
            
            <div class="v-teams-container">
                <div class="v-team-info">
                    <div class="dot bg-blue"></div>
                    <div class="dot bg-red"></div>
                    <span class="v-team-text" id="v-score-ns-text">1/13</span>
                </div>
                
                <span class="v-nav-divider">|</span>
                
                <div class="v-team-info">
                    <div class="dot bg-yellow"></div>
                    <div class="dot bg-green"></div>
                    <span class="v-team-text" id="v-score-ew-text">1/1</span>
                </div>
            </div>

            <div class="v-review-container">
                <div class="v-review-scrollarea" id="review-scrollarea">    
                </div>
            </div>
            
            <button class="btn-action btn-again" id="btn-again" onclick="setupNewDeck()">再來一場</button>
            <button id="btn-lobby" class="btn-lobby" onclick="window.location.href='index.html'">回主畫面</button>
        </div>
    </div>
    
    <script src="js/bridge_rule.js"></script>
    <script src="js/computer.js"></script>
    <script src="js/one_people.js"></script>
</body>
</html>
