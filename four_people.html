<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌四人對戰 - 實名對戰版</title>
    <style>
        :root {
            --felt-green: #246324;
            --info-gold: #f1c40f;
            --card-white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a3c14;
            color: white; font-family: sans-serif;
            overflow: hidden;
        }

        .table-container {
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            grid-template-rows: 80px 1fr 150px;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, var(--felt-green) 0%, #153610 100%);
        }

        .player-slot { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .player-info { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; border: 1px solid var(--info-gold); margin-bottom: 5px; text-align: center; max-width: 110px; overflow: hidden; white-space: nowrap; }

        .pos-top { grid-column: 2; grid-row: 1; }
        .pos-bottom { grid-column: 2; grid-row: 3; align-self: end; }
        .pos-left  { grid-column: 1; grid-row: 2; }
        .pos-right  { grid-column: 3; grid-row: 2; }

        .center-field {
            grid-column: 2; grid-row: 2;
            border: 2px dashed rgba(255,255,255,0.1);
            margin: 10px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            gap: 10px;
        }

        .hand-area { display: flex; justify-content: center; width: 100%; height: 110px; padding-bottom: 10px; }
        .card {
            width: 55px; height: 85px;
            background: var(--card-white);
            border-radius: 4px;
            margin-left: -25px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            color: black;
            display: flex; flex-direction: column;
            padding: 5px; font-weight: bold;
            transition: transform 0.2s; cursor: pointer;
            user-select: none;
            position: relative;
        }
        .card:first-child { margin-left: 0; }
        .card:hover { transform: translateY(-20px); z-index: 100 !important; }
        .card.red { color: #e74c3c; }

        .status-bar {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 0.8rem; z-index: 100;
        }
        .waiting-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading" class="waiting-overlay">
        <h2 id="loading-title">正在載入牌局...</h2>
        <p id="wait-msg">準備中</p>
    </div>

    <div class="status-bar">
        角色: <span id="my-role-display">載入中</span><br>
        輪到: <span id="turn-display">等待中</span>
    </div>

    <div class="table-container">
        <div class="player-slot pos-top">
            <div class="player-info" id="label-top">等待中...</div>
            <div style="font-size: 1.5rem;">🎴</div>
        </div>

        <div class="player-slot pos-left">
            <div class="player-info" id="label-left">等待中...</div>
            <div style="writing-mode: vertical-lr; font-size: 1.5rem;">🎴</div>
        </div>
        
        <div class="center-field" id="table-center"></div>

        <div class="player-slot pos-right">
            <div class="player-info" id="label-right">等待中...</div>
            <div style="writing-mode: vertical-lr; font-size: 1.5rem;">🎴</div>
        </div>
        
        <div class="player-slot pos-bottom">
            <div class="player-info" id="label-bottom">載入中 (你)</div>
            <div class="hand-area" id="my-hand"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAkwCXf6_Fd4jp79tk6YUC9yHynYXjLDQ",
            authDomain: "bridge-go.firebaseapp.com",
            projectId: "bridge-go",
            databaseURL: "https://bridge-go-default-rtdb.firebaseio.com",
            storageBucket: "bridge-go.firebasestorage.app",
            messagingSenderId: "212052576521",
            appId: "1:212052576521:web:dd45f303d59f5315ddabd8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myRole = ""; 
        const roomId = "Bridge_Room_001";
        const roomRef = database.ref('rooms/' + roomId);
        const myName = localStorage.getItem('bridge_name') || "匿名玩家";

        // --- 1. 自動入座邏輯 (整合名字) ---
        roomRef.child('players').transaction((p) => {
            if (!p) p = {};
            if (!p.south) { myRole = "south"; p.south = {name: myName}; }
            else if (!p.west) { myRole = "west"; p.west = {name: myName}; }
            else if (!p.north) { myRole = "north"; p.north = {name: myName}; }
            else if (!p.east) { myRole = "east"; p.east = {name: myName}; }
            else { 
                // 檢查是否是斷線重連 (名字一樣的人)
                const existingRole = Object.keys(p).find(key => p[key].name === myName);
                if (existingRole) { myRole = existingRole; return p; }
                return; 
            }
            return p;
        }, (err, committed, snap) => {
            if (committed) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('my-role-display').innerText = myRole.toUpperCase();
                
                // 炸房與清理邏輯
                if (myRole === "south") {
                    roomRef.onDisconnect().remove();
                } else {
                    roomRef.child('players/' + myRole).onDisconnect().remove();
                }

                startListening();
                // 只有南家負責發新牌，且如果 table 為空才發 (避免重連時洗掉現有的牌)
                if (myRole === "south") {
                    roomRef.child('hands').get().then(s => {
                        if (!s.exists()) setupNewDeck();
                    });
                }
            } else {
                alert("房間已滿，請稍後再試。");
                window.location.href = "index.html";
            }
        });

        // --- 2. 監聽與主觀視角動態更新 ---
        function startListening() {
            // 監聽房主是否解散房間
            roomRef.on('value', (snap) => {
                if (myRole !== "" && !snap.exists()) {
                    alert("遊戲已結束。");
                    window.location.href = "index.html";
                }
            });

            // 動態更新所有玩家的名字顯示 (主觀視角旋轉)
            roomRef.child('players').on('value', (snap) => {
                const p = snap.val();
                if (!p) return;

                const roles = ['south', 'west', 'north', 'east'];
                const myIdx = roles.indexOf(myRole);

                const getPName = (role) => (p[role] ? p[role].name : "等待中...");

                document.getElementById('label-bottom').innerText = getPName(myRole) + " (你)";
                document.getElementById('label-left').innerText   = getPName(roles[(myIdx + 1) % 4]);
                document.getElementById('label-top').innerText    = getPName(roles[(myIdx + 2) % 4]);
                document.getElementById('label-right').innerText  = getPName(roles[(myIdx + 3) % 4]);
            });

            // 聽自己的手牌
            roomRef.child('hands/' + myRole).on('value', (snap) => {
                const hand = snap.val();
                if (hand) renderHand(hand);
            });

            // 聽輪到誰
            roomRef.child('turn').on('value', (snap) => {
                const t = snap.val();
                if (t) document.getElementById('turn-display').innerText = (t === myRole) ? "⭐ 你的回合" : t.toUpperCase();
            });

            // 聽桌面出牌與吃墩判斷
            roomRef.child('table').on('value', (snap) => {
                const tableCards = snap.val();
                const center = document.getElementById('table-center');
                center.innerHTML = "";
                if (tableCards) {
                    Object.values(tableCards).forEach(data => {
                        const cardDiv = document.createElement('div');
                        cardDiv.className = `card ${(data.s === '♥' || data.s === '♦') ? 'red' : ''}`;
                        cardDiv.style.margin = "5px";
                        cardDiv.innerHTML = `${data.v}<span>${data.s}</span>`;
                        center.appendChild(cardDiv);
                    });
                    checkTrickWinner(tableCards);
                }
            });
        }

        // --- 3. 遊戲核心規則 ---
        function checkTrickWinner(tableCards) {
            const cardsArray = Object.values(tableCards);
            if (cardsArray.length < 4) return;

            const leadSuit = cardsArray[0].s;
            const values = {'A':14, 'K':13, 'Q':12, 'J':11, '10':10, '9':9, '8':8, '7':7, '6':6, '5':5, '4':4, '3':3, '2':2};

            let winnerData = cardsArray[0];
            cardsArray.forEach(card => {
                if (card.s === leadSuit && values[card.v] > values[winnerData.v]) {
                    winnerData = card;
                }
            });

            setTimeout(() => {
                if (myRole === "south") {
                    roomRef.child('table').remove();
                    roomRef.child('turn').set(winnerData.from);
                }
            }, 1500);
        }

        function setupNewDeck() {
            const suits = ['♠', '♥', '♦', '♣'];
            const values = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
            let deck = [];
            suits.forEach(s => values.forEach(v => deck.push({s, v})));
            deck.sort(() => Math.random() - 0.5);

            roomRef.child('hands').set({
                south: deck.slice(0, 13),
                west: deck.slice(13, 26),
                north: deck.slice(26, 39),
                east: deck.slice(39, 52)
            });
            roomRef.child('turn').set("south");
        }

        function renderHand(hand) {
            const container = document.getElementById('my-hand');
            container.innerHTML = "";
            hand.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = `card ${(card.s === '♥' || card.s === '♦') ? 'red' : ''}`;
                div.innerHTML = `${card.v}<span>${card.s}</span>`;
                div.onclick = () => tryPlayCard(card, index, hand);
                container.appendChild(div);
            });
        }

        function tryPlayCard(card, index, hand) {
            roomRef.child('turn').get().then(snap => {
                if (snap.val() !== myRole) {
                    alert("還沒輪到你！");
                    return;
                }
                hand.splice(index, 1);
                roomRef.child('hands/' + myRole).set(hand);
                roomRef.child('table').push({ ...card, from: myRole });
                const flow = { south: "west", west: "north", north: "east", east: "south" };
                roomRef.child('turn').set(flow[myRole]);
            });
        }
    </script>
</body>
</html>
