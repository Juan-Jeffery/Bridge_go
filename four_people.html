<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋牌四人對戰 - 專業競技版</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="loading" class="waiting-overlay"><h2>遊戲準備中... 洗牌發牌中...</h2></div>

    <div class="status-bar">
        <div id="contract-display">目前喊牌: 喊牌中...</div>
        <div id="score-display-teams">載入中...</div>
        <div id="turn-display">輪到: <span id="turn-name-display">...</span></div>
    </div>

    <div id="bidding-modal">
        <h3 id="bidding-title">喊牌階段</h3>
        <div id="bidding-history">等待喊牌...</div>
        <div class="bid-grid" id="bid-buttons-container">
            </div>
        <button class="bid-btn pass-btn" id="btn-pass" onclick="submitBid('Pass')">Pass (不叫)</button>
    </div>

    <div class="table-container">
        <div class="player-slot pos-top">
            <div class="player-info" id="label-top">等待中...</div>
            <div class="trick-pile pile-top" id="pile-top">0</div>
            <div style="font-size: 2rem;"></div>
        </div>
        <div class="player-slot pos-left">
            <div class="player-info" id="label-left">等待中...</div>
            <div class="trick-pile pile-left" id="pile-left">0</div>
            <div style="writing-mode: vertical-lr; font-size: 2rem;"></div>
        </div>
        <div class="center-field" id="table-center"></div>
        <div class="player-slot pos-right">
            <div class="player-info" id="label-right">等待中...</div>
            <div class="trick-pile pile-right" id="pile-right">0</div>
            <div style="writing-mode: vertical-lr; font-size: 2rem;"></div>
        </div>
        <div class="player-slot pos-bottom">
            <div class="player-info" id="label-bottom">- (你)</div>
            <div class="trick-pile pile-bottom" id="pile-bottom">0</div>
            <div class="hand-area" id="my-hand"></div>
        </div>
    </div>

    <div id="victory-overlay">
        <div class="victory-card">
            <h1 id="victory-title">👑 勝利 👑</h1>
            <h2 id="victory-team-names">玩家A & 玩家B</h2>
            <div id="victory-stats">
                最終喊牌: <span id="v-contract" style="color:var(--premium-gold); font-weight:bold;">-</span>
                <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                    <div id="v-ns-line">載入中...</div>
                    <div id="v-ew-line">載入中...</div>
                </div>
                <span id="v-result" style="display:none;"></span>
            </div>
            
            <div class="victory-buttons">
                <button class="btn-action btn-again" id="btn-again" onclick="votePlayAgain()">再來一場</button>
                <button class="btn-action btn-lobby" id="btn-lobby" onclick="voteReturnLobby()">重新分隊</button>
            </div>
            
            <div id="vote-status-display" style="margin-top: 15px; font-size: 0.95rem; color: var(--text-muted); line-height: 1.6;">
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/game-logic.js"></script>
</body>
</html>
